<div class="container">
  <div class="flex flex-wrap gap-4 lg:items-center lg:gap-0">
    @for (timetableItem of userTimetableItemsSig(); track timetableItem) {
      <free-spot-timetable-item class="grow" [timetableItemSig]="timetableItem"></free-spot-timetable-item>
    } @empty {
      @for (timetableItem of emptyTimetable; track timetableItem) {
        <free-spot-timetable-item class="grow" [timetableItemSig]="timetableItem"></free-spot-timetable-item>
      }
    }
  </div>
</div>
