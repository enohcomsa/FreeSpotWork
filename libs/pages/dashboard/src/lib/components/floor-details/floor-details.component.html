<free-spot-floor-booking-drawer [toggleStateSig]="toggleStateSig()" (toggleStateSigChange)="toggleStateSig.set($event)">
  <div class="container">
    <h1 class="font-bold text-xl pb-4 pt-8 sm:text-2xl md:pb-8 md:pt-12 md:text-3xl">{{ floorName() }}</h1>
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      @for(room of floorExp.roomList;track room.name){
      <free-spot-floor-room
        [roomDataSig]="room"
        [buildingNameSig]="floorExp.buildingName"
        [toggleStateSig]="toggleStateSig()"
        (toggleStateSigChange)="toggleStateSig.set($event)"
      ></free-spot-floor-room>
      }
    </div>
  </div>
</free-spot-floor-booking-drawer>
