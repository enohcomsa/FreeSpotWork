<free-spot-floor-booking-drawer
  [roomNameSig]="roomBookingSearchSig()"
  [toggleStateSig]="toggleStateSig()"
  (toggleStateSigChange)="toggleStateSig.set($event)"
>
  <div class="container">
    <h1 class="pb-4 pt-8 text-xl font-bold sm:text-2xl md:pb-8 md:pt-12 md:text-3xl">{{ floorNameSig() }}</h1>
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      @for (room of floorSig().roomList; track room.name) {
        <free-spot-floor-room
          [roomDataSig]="room"
          [buildingNameSig]="floorSig().buildingName"
          [toggleStateSig]="toggleStateSig()"
          (toggleStateSigChange)="toggleStateSig.set($event)"
          (roomBookingSearchSig)="roomBookingSearchSig.set($event)"
        ></free-spot-floor-room>
      } @empty {
        <h3>No room added yet.</h3>
      }
    </div>
  </div>
</free-spot-floor-booking-drawer>
