<div class="container">
  <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">Room: {{ roomSig().name }}</h1>
  <h2 class="pb-4 pt-8 text-2xl font-bold md:pb-8 md:pt-12">Room subjects</h2>

  <free-spot-dynamic-chip-list [optionListSig]="subjectListSig()"
    [itemListSig]="roomSubjectListSig()?   roomSubjectListSig() : []" itemKeyDysplay="name" itemLabelSig="subject"
    (itemListSigChange)="onSubjectListChange($event)">
  </free-spot-dynamic-chip-list>

  <h2 class="pb-4 pt-8 text-2xl font-bold md:pb-8 md:pt-12">Room timetable items</h2>
  @for (roomTimetableItem of timetablePerDay(); track roomTimetableItem.day) {
  <h2 class="pb-4 pt-8 text-xl font-bold md:pb-8 md:pt-12">{{ roomTimetableItem.day }}</h2>
  <free-spot-admin-room-timetable-item class="grow" [roomIdSig]="roomIdSig()" [subjectListSig]="roomSubjectListSig()"
    [day]="roomTimetableItem.day" [dayTimetableActivityCardVMListSig]="roomTimetableItem.activities">
  </free-spot-admin-room-timetable-item>
  }

  <h2 class="pb-4 pt-8 text-2xl font-bold md:pb-8 md:pt-12">Room timetable</h2>
  <div class="flex flex-wrap gap-4 lg:items-center lg:gap-0">
    @for(dayItem of timetablePerDay();track dayItem.day){
    <free-spot-timetable-item class="grow" [day]="dayItem.day" [timetableItemSig]="dayItem.activities">
    </free-spot-timetable-item>
    }
  </div>
</div>
