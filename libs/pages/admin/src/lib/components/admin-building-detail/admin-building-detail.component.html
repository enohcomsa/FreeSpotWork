<div class="container">
  <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">Building: {{ buildingNameSig() }}</h1>
  <h2 class="pb-4 pt-8 text-2xl font-bold md:pb-8 md:pt-12">Building floors</h2>
  <div class="flex flex-col gap-8 pb-4 md:grid md:grid-cols-2 xl:grid-cols-3">
    @for (floor of buildig.floorList; track floor) {
      <free-spot-admin-floor-card
        [adminFloorSig]="floor"
        [addingFloorSig]="addingFloor"
        (addingFloorSigChange)="addingFloor = $event"
        (editFloor)="onEditFloor()"
      ></free-spot-admin-floor-card>
    }
  </div>
  <div #editFloor>
    @if (addingFloor) {
      <form class="flex flex-col py-4 sm:flex-row sm:items-center sm:gap-4" (ngSubmit)="onAddFloor()">
        <mat-form-field>
          <mat-label>New floor</mat-label>
          <input type="text" matInput [formControl]="addFloorFormControl" />
        </mat-form-field>
        <button mat-flat-button type="submit" class="sm:mb-5">Add floor</button>
      </form>
    }
  </div>
</div>
