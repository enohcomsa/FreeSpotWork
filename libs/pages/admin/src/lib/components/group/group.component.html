<div class="container">
  <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">Group: {{ groupNameSig() }}</h1>

  <mat-tab-group dynamicHeight>
    <mat-tab label="Group">
      <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">Students</h1>
      <free-spot-dynamic-chip-list [itemListSig]="groupData.studentList" itemLabelSig="student"> </free-spot-dynamic-chip-list>
    </mat-tab>
    <mat-tab label="Semigroup 1">
      <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">Students</h1>
      <free-spot-dynamic-chip-list [itemListSig]="groupData.studentList" itemLabelSig="student"> </free-spot-dynamic-chip-list>
    </mat-tab>
    <mat-tab label="Semigroup 2">
      <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">Students</h1>
      <free-spot-dynamic-chip-list [itemListSig]="groupData.studentList" itemLabelSig="student"> </free-spot-dynamic-chip-list>
    </mat-tab>
  </mat-tab-group>
</div>
