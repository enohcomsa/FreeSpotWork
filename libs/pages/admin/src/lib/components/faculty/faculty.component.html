<h2 class="pb-2 pt-4 text-xl font-bold md:pb-4 md:pt-8">Subjects</h2>

<free-spot-dynamic-chip-list
  [itemListSig]="facultySig().subjectList || []"
  (itemListSigChange)="onSubjectListChanged($event)"
  [optionListSig]="subjectList"
  itemLabelSig="subject"
  itemKeyDysplay="name"
></free-spot-dynamic-chip-list>

<h2 class="pb-2 pt-4 text-xl font-bold md:pb-4 md:pt-8">Years</h2>
@for (year of facultySig().yearList; track year.name) {
  <mat-list>
    <div mat-subheader class="flex cursor-pointer items-center gap-2 text-lg font-bold">
      <span
        (click)="editYear.emit(year)"
        matTooltip="click to edit year"
        matTooltipPosition="right"
        matTooltipPositionAtOrigin="true"
        matTooltipShowDelay="500"
        >{{ year.name }}</span
      >
      <mat-icon
        (click)="deleteYear(year)"
        matTooltip="click to delete year"
        matTooltipPosition="right"
        matTooltipPositionAtOrigin="true"
        matTooltipShowDelay="500"
        >cancel</mat-icon
      >
    </div>

    <free-spot-dynamic-chip-list
      [itemListSig]="year.yearGroupList ? year.yearGroupList : []"
      (itemListSigChange)="onYearGroupListChange($event, year)"
      itemLabelSig="group"
      itemKeyDysplay="name"
      itemDinamicRoute="group/"
    ></free-spot-dynamic-chip-list>

    <mat-divider></mat-divider>
  </mat-list>
} @empty {
  <mat-list>
    <div mat-subheader class="text-lg font-bold">No year added yet</div>
    <mat-divider></mat-divider>
  </mat-list>
}
