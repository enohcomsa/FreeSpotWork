<mat-chip-set>
  @for (admin of admminUserList; track admin) {
    <mat-chip>
      <p>{{ admin }}</p>
      <button matChipRemove>
        <mat-icon>cancel</mat-icon>
      </button>
    </mat-chip>
  }
  <button mat-icon-button class="ml-2" (click)="adingAdmin = true">
    <mat-icon class="mb-2">add </mat-icon>
  </button>
</mat-chip-set>

@if (adingAdmin) {
  <form class="flex flex-col py-4 sm:flex-row sm:items-center sm:gap-4" (ngSubmit)="onAddAdmin()">
    <mat-form-field>
      <mat-label>New admin</mat-label>
      <input type="text" matInput [formControl]="addAdminForm" [matAutocomplete]="auto" />
      <mat-autocomplete #auto="matAutocomplete">
        @for (user of admminUserList; track user) {
          <mat-option [value]="user">{{ user }}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>
    <button mat-flat-button type="submit" class="sm:mb-5">Add admin</button>
  </form>
}
