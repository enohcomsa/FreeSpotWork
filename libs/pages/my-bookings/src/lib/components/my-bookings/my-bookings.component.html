<div class="container">
  <free-spot-dynamic-form></free-spot-dynamic-form>

  <h1 class="pb-4 pt-8 text-3xl font-bold md:pb-8 md:pt-12">My bookings</h1>

  <mat-chip-listbox class="mb-4">
    <mat-chip-option selected> All bookings</mat-chip-option>
    <mat-chip-option> Laboratory</mat-chip-option>
    <mat-chip-option> Course</mat-chip-option>
    <mat-chip-option> Project</mat-chip-option>
  </mat-chip-listbox>

  <div class="grid grid-cols-1 gap-8 pb-4 md:grid-cols-2 lg:grid lg:grid-cols-3">
    @for (bookedEvent of currentUserSig().bookingList; track bookedEvent) {
      <free-spot-booked-spot [eventSig]="bookedEvent"> </free-spot-booked-spot>
    }
  </div>

  <h1 class="py-4 text-3xl font-bold md:py-8">My Events</h1>

  <div class="grid grid-cols-1 gap-8 pb-4 md:grid-cols-2 lg:grid lg:grid-cols-3">
    <!-- <free-spot-booked-spot> </free-spot-booked-spot>
    <free-spot-booked-spot> </free-spot-booked-spot> -->
  </div>
</div>
