<mat-card class="@container h-full cursor-pointer">
  <mat-card-content
    class="!flex h-full min-h-fit items-center justify-center"
    matTooltip="click to add item"
    matTooltipPosition="right"
    matTooltipPositionAtOrigin="true"
    matTooltipShowDelay="500"
  >
    <button mat-icon-button class="md:@xs:scale-[3] md:@sm:scale-[2.5] ml-2 scale-[2]">
      <mat-icon class="primary-icon mb-2">add </mat-icon>
    </button>
  </mat-card-content>
</mat-card>
